databases:
  - name: f1roller-db
    plan: free
    databaseName: f1roller
    user: f1roller

services:
  - type: web
    name: f1roller-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: f1roller-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://f1roller-web.onrender.com
      - key: SIM_SEASON_YEAR
        value: "2026"

  - type: web
    name: f1roller-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://f1roller-api.onrender.com/api

  - type: cron
    name: sync-openf1
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 6 * * *"
    dockerCommand: python -m app.jobs.sync_openf1

  - type: cron
    name: precompute-benchmark
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 4 * * 0"
    dockerCommand: python -m app.jobs.precompute_benchmark
